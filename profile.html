<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix Clone - Quem está assistindo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <header class="profile-select-header">
        <span class="iconify netflix-logo" data-icon="logos:netflix"></span>
    </header>
    <main class="profile-select-main" id="mainContent">
        <h1 class="i18n-text" data-i18n="titleWho">Quem está assistindo?</h1>
        <div class="profiles-container" id="profilesContainer"></div>
        <button class="manage-profiles-btn i18n-text" data-i18n="btnManage">Gerenciar perfis</button>
    </main>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="netflix-spinner"></div>
    </div>
    <script src="js/core/config.js" defer></script>
    <script src="js/core/i18n.js" defer></script>
    <script src="js/core/utils.js" defer></script>
    <script src="js/services/local-storage.js" defer></script>
    <script src="js/pages/profile.js" defer></script>
</body>
</html>
